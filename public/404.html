<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>페이지를 찾지 못했어요 — TappyType</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'TappyTypeSample';
  src:url('/assets/myhandwritting.woff2') format('woff2');
  font-display:swap;
}
:root{
  --ivory:#FFF7F3; --cream:#F6EFE6; --blush:#FFE4EA; --rose:#F6C5CE;
  --rose-deep:#F2A8B8; --lavender:#C5B4DC; --lavender-tint:#E8DDF4;
  --coral:#FFB3AA; --cocoa:#6B4F43; --cocoa-muted:#7A5E52;
  --soft-gray:#E6E2DD; --warm-white:#FFFDFB; --rose-ink:#C75A72; --lavender-ink:#6E579F;
  --serif:'Playfair Display',serif;
  --body:'Gowun Dodum',sans-serif;
  --pen-me:'TappyTypeSample',cursive;
  --shadow-pop:0 12px 40px rgba(107,79,67,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);color:var(--cocoa);background:var(--ivory);
  line-height:1.7;min-height:100vh;display:grid;place-items:center;
  padding:clamp(1.5rem,5vw,3rem);
  background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 47px,rgba(107,79,67,.045) 47px,rgba(107,79,67,.045) 48px);
}
::selection{background:var(--blush);color:var(--rose-ink)}
a{color:var(--rose-ink)}
img{max-width:100%;height:auto;display:block}

.wrap{width:min(100%,560px);text-align:center;position:relative}

/* 언어 토글 */
.lang-toggle{
  position:absolute;top:0;right:0;
  font-family:var(--body);font-size:.82rem;color:var(--cocoa);cursor:pointer;
  background:var(--warm-white);border:1px solid var(--soft-gray);border-radius:999px;
  padding:.32rem .85rem;transition:.2s;
}
.lang-toggle:hover{border-color:var(--rose);background:var(--blush)}

/* 404 — 가운데 0을 빈 연습장 칸으로 */
.code{
  display:flex;align-items:center;justify-content:center;gap:clamp(.4rem,2vw,1rem);
  margin:2.6rem 0 .4rem;
}
.code .digit{
  font-family:var(--serif);font-weight:700;line-height:1;
  font-size:clamp(5rem,22vw,9rem);color:var(--rose-deep);
}
.cell{
  position:relative;
  width:clamp(5rem,22vw,9rem);height:clamp(5rem,22vw,9rem);
  border:2.5px dashed var(--rose);border-radius:1.2rem;background:var(--warm-white);
  display:grid;place-items:center;flex:0 0 auto;
  box-shadow:var(--shadow-pop);
}
.cell .guide-h,.cell .guide-v{position:absolute;background:transparent}
.cell .guide-h{left:12%;right:12%;top:50%;border-top:1.5px dashed var(--soft-gray)}
.cell .guide-v{top:12%;bottom:12%;left:50%;border-left:1.5px dashed var(--soft-gray)}
.cell .ghost{
  font-family:var(--pen-me);font-size:clamp(2.4rem,11vw,4.6rem);
  color:var(--cream);user-select:none;line-height:1;
}
.cell .q{
  position:absolute;top:-.5rem;right:-.5rem;
  font-family:var(--pen-me);font-size:clamp(1.6rem,7vw,2.6rem);color:var(--lavender-ink);
  transform:rotate(8deg);
}

.eyebrow{
  font-family:var(--pen-me);font-size:1.5rem;color:var(--rose-ink);margin-bottom:.3rem;
}
h1{
  font-size:clamp(1.5rem,4.5vw,2.1rem);font-weight:400;letter-spacing:-.01em;line-height:1.4;
}
h1 .hand{font-family:var(--pen-me);color:var(--rose-ink);font-size:1.18em}
p.sub{margin:1rem auto 1.9rem;color:var(--cocoa-muted);max-width:30rem;font-size:1.02rem}

.cta-row{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;cursor:pointer;
  font-family:var(--body);font-size:.98rem;border-radius:1.1rem;padding:.85rem 1.5rem;transition:.25s;
}
.btn-primary{
  color:#fff;background:linear-gradient(135deg,var(--rose-deep),var(--rose-ink));
  box-shadow:0 6px 20px rgba(199,90,114,.28);border:none;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(199,90,114,.36)}
.btn-ghost{color:var(--cocoa);background:var(--warm-white);border:1.5px solid var(--soft-gray)}
.btn-ghost:hover{border-color:var(--rose);background:var(--blush)}

.tappy{
  width:clamp(120px,30vw,176px);margin:0 auto 0;
  filter:drop-shadow(0 8px 18px rgba(107,79,67,.18));
  animation:bob 3.4s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(1.5deg)}}

a:focus-visible,.btn:focus-visible,.lang-toggle:focus-visible{
  outline:3px solid var(--lavender-ink);outline-offset:3px;
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<main class="wrap">
  <button class="lang-toggle" id="langToggle" aria-label="Switch language">EN</button>

  <img class="tappy" src="/assets/mascot-waving.png" alt="펜을 든 태피가 손을 흔들어요" width="488" height="500">

  <div class="code" role="img" aria-label="404">
    <span class="digit">4</span>
    <span class="cell" aria-hidden="true">
      <span class="guide-h"></span><span class="guide-v"></span>
      <span class="ghost">?</span>
      <span class="q">!</span>
    </span>
    <span class="digit">4</span>
  </div>

  <span class="eyebrow" data-i18n="eyebrow">앗, 빈 칸이에요</span>
  <h1 data-i18n-html="title">이 <span class="hand">페이지</span>는 아직 안 써졌어요</h1>
  <p class="sub" data-i18n="sub">찾으시는 칸이 비어 있네요. 홈으로 돌아가 내 손글씨를 폰트로 만들어 볼까요?</p>

  <div class="cta-row">
    <a class="btn btn-primary" href="/">🏠 <span data-i18n="home">홈으로 가기</span></a>
    <a class="btn btn-ghost" href="https://apps.apple.com/us/app/tappytype/id6777860562" target="_blank" rel="noopener">🍎 <span data-i18n="appstore">App Store에서 받기</span></a>
  </div>
</main>

<script>
const I18N = {
  ko:{
    eyebrow:'앗, 빈 칸이에요',
    title:'이 <span class="hand">페이지</span>는 아직 안 써졌어요',
    sub:'찾으시는 칸이 비어 있네요. 홈으로 돌아가 내 손글씨를 폰트로 만들어 볼까요?',
    home:'홈으로 가기', appstore:'App Store에서 받기',
  },
  en:{
    eyebrow:'Oops, an empty cell',
    title:'This <span class="hand">page</span> hasn’t been written yet',
    sub:'The cell you’re looking for is blank. Head home and turn your handwriting into a font?',
    home:'Back to home', appstore:'Get it on the App Store',
  }
};
let lang = localStorage.getItem('tt-lang') || (navigator.language.startsWith('ko') ? 'ko' : 'en');
const langBtn = document.getElementById('langToggle');
function applyLang(){
  const d = I18N[lang];
  document.documentElement.lang = lang;
  langBtn.textContent = lang === 'ko' ? 'EN' : '한';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n; if(d[k]) el.textContent=d[k];});
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{const k=el.dataset.i18nHtml; if(d[k]) el.innerHTML=d[k];});
}
langBtn.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';localStorage.setItem('tt-lang',lang);applyLang();});
applyLang();
</script>
</body>
</html>
